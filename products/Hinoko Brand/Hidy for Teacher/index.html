<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidy for Teacher | Education Support</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+1:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="../../../style/style.css">

    <!-- Tailwind Config -->
    <style type="text/tailwindcss">
        @theme {
            --color-kazenoko-cyan: #00e5ff;
            --color-kazenoko-dark: #1a1a1a;
            --color-hinoko-orange: #ff6b00;
            --color-hinoko-black: #050505;
            --color-hidy-blue: #3b82f6;
            
            --font-gothic: "Dela Gothic One", sans-serif;
            --font-zen: "Zen Kaku Gothic New", sans-serif;
            --font-mplus: "M PLUS 1", sans-serif;
        }
    </style>
</head>

<body class="antialiased w-full h-full relative bg-hinoko-black text-white font-mplus">

    <!-- Transition Layer -->
    <div id="transition-overlay"></div>

    <!-- Navigation -->
    <nav
        class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 mix-blend-difference text-white">
        <div class="font-gothic text-xl tracking-tighter">HINOKO</div>
        <div class="flex gap-4 items-center">
            <a href="../../../hinoko.html"
                class="magnetic-btn font-mplus font-medium hover:opacity-70 transition-opacity uppercase text-sm tracking-widest cursor-pointer text-hidy-blue">BACK</a>
        </div>
    </nav>

    <main class="min-h-screen flex flex-col justify-center items-center px-6 text-center relative overflow-hidden">

        <!-- Background -->
        <div class="absolute inset-0 pointer-events-none z-0">
            <div class="parallax-layer absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] bg-hidy-blue rounded-full blur-[150px] opacity-20 animate-pulse"
                data-speed="2"></div>
        </div>

        <div class="relative z-10 max-w-4xl">
            <p class="text-hidy-blue tracking-[0.3em] mb-4 fade-in-up">EDUCATION SUPPORT FOR TEACHERS</p>
            <h1 class="text-7xl md:text-9xl font-bold mb-8 fade-in-up" style="animation-delay: 0.1s;">Hidy<span
                    class="text-hidy-blue"> for Teacher</span></h1>
            <p class="text-2xl md:text-4xl font-light text-gray-300 mb-12 fade-in-up" style="animation-delay: 0.2s;">
                問題作成、テスト作成の効率化を、<br>強力にサポート。
            </p>

            <div class="p-8 border border-white/10 bg-white/5 rounded-xl backdrop-blur-md fade-in-up"
                style="animation-delay: 0.3s;">
                <p class="text-lg leading-relaxed text-gray-400">
                    Hidy for Teacherは、教育現場の業務効率化を実現します。<br>
                    問題作成からテスト生成まで、AIがサポートし、<br>
                    先生方は本来の教育活動により多くの時間を費やせます。
                </p>
            </div>

            <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4 fade-in-up" style="animation-delay: 0.4s;">
                <div class="p-4 border border-hidy-blue/30 bg-hidy-blue/5 rounded-lg">
                    <p class="text-hidy-blue text-sm font-bold mb-2">問題自動生成</p>
                    <p class="text-xs text-gray-500">難易度・分野を指定して作成</p>
                </div>
                <div class="p-4 border border-hidy-blue/30 bg-hidy-blue/5 rounded-lg">
                    <p class="text-hidy-blue text-sm font-bold mb-2">テスト作成</p>
                    <p class="text-xs text-gray-500">フォーマット自動調整</p>
                </div>
                <div class="p-4 border border-hidy-blue/30 bg-hidy-blue/5 rounded-lg">
                    <p class="text-hidy-blue text-sm font-bold mb-2">採点支援</p>
                    <p class="text-xs text-gray-500">効率的なフィードバック</p>
                </div>
            </div>
        </div>

    </main>

    <!-- Global Scripts -->
    <script src="../../../js/main.js"></script>
</body>

</html>
